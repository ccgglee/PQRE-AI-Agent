name: Auto PQRE Analysis Request

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  request-pqre-analysis:
    runs-on: ubuntu-latest

    if: contains(github.event.issue.title, '[AI Risk Review]')

    steps:
      - name: Add analysis request comment
        uses: actions/github-script@v7

        with:
          script: |
            const issueNumber = context.payload.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: "@copilot\n\nUse pqre-risk-review-agent.\n\nAnalyze this issue and return the complete PQRE review in this issue comment."
            });
