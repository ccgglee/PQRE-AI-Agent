name: Auto PQRE Analysis Request

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  request-pqre-analysis:
    if: contains(github.event.issue.title, '[AI Risk Review]')
    runs-on: ubuntu-latest


steps:
  - name: Add Copilot analysis request comment
    uses: actions/github-script@v7
    with:
         script: |
        const issueNumber = context.payload.issue.number;

        await github.rest.issues.createComment({
          owner: context.repo.owner,
          repo: context.repo.repo,
          issue_number: issueNumber,
          body: '@copilot\n\nAnalyze this issue and return a PQRE review in this issue comment.'
        });
``
