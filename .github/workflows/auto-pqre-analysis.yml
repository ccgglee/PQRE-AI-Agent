name: Auto PQRE Analysis Request

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  request-pqre-analysis:
    if: contains(github.event.issue.title, '[AI Risk Review]')
    runs-on: ubuntu-latest

    steps:
      - name: Add Copilot analysis request comment
        uses: actions/github-script@v7

        with:
          script: |
            const issueNumber = context.payload.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `@copilot

Use pqre-risk-review-agent.

Analyze this issue and return the complete PQRE review in this issue comment.

Output:
1. Executive Summary
2. Available Evidence
3. Missing Evidence
4. Known Issues
5. Unknown Risks
6. Qualification Gaps
7. Risk Assessment
8. Required Actions
9. PQRE Recommendation
10. Traditional Chinese Summary`
            });
