name: Auto PQRE Analysis Request

on:
  issues:
    types:
      - opened

permissions:
  issues: write
  contents: read

jobs:
  request-pqre-analysis:
    if: contains(github.event.issue.title, '[AI Risk Review]')
    runs-on: ubuntu-latest

    steps:
      - name: Add Copilot analysis request comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: "@copilot\n\nUse pqre-risk-review-agent.\n\nAnalyze this issue and return the complete PQRE review in this issue comment.\n\nRequired Output:\n1. Executive Summary\n2. Available Evidence\n3. Missing Evidence\n4. Known Issues\n5. Unknown Risks\n6. Qualification Gaps\n7. Risk Assessment\n8. Required Actions\n9. PQRE Recommendation\n10. Traditional Chinese Summary"
            });
``
