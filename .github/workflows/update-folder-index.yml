name: Update folder_index.yaml

on:
  workflow_dispatch:
    inputs:
      yaml_content_base64:
        description: "Base64 encoded folder_index.yaml content"
        required: true
      commit_message:
        description: "Commit message"
        required: true

permissions:
  contents: write

jobs:
  update-folder-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode YAML content
        run: |
          mkdir -p KnowledgeBase/Sources
          echo "${{ github.event.inputs.yaml_content_base64 }}" | base64 -d > KnowledgeBase/Sources/folder_index.yaml

      - name: Commit changes
        run: |
          git config user.name "power-automate-bot"
          git config user.email "power-automate-bot@users.noreply.github.com"
          git add KnowledgeBase/Sources/folder_index.yaml
          git commit -m "${{ github.event.inputs.commit_message }}" || echo "No changes to commit"
          git push
